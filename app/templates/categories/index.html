{% extends "base.html" %}

{% block content %}
<div class="row g-4">
    <div class="col-lg-8">
        <div class="glass-card p-4">
            <h4 class="fw-bold mb-4">現有分類</h4>
            <div class="table-responsive">
                <table class="table table-dark table-hover table-borderless align-middle" style="background: transparent;">
                    <thead>
                        <tr class="border-bottom border-secondary">
                            <th>類型</th>
                            <th>名稱</th>
                            <th>屬性</th>
                            <th class="text-end">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in categories %}
                        <tr>
                            <td>
                                {% if c.type == 'income' %}
                                    <span class="text-success-custom"><i class="bi bi-arrow-up-circle"></i> 收入</span>
                                {% else %}
                                    <span class="text-danger-custom"><i class="bi bi-arrow-down-circle"></i> 支出</span>
                                {% endif %}
                            </td>
                            <td class="fw-bold">{{ c.name }}</td>
                            <td>
                                {% if c.is_default %}
                                    <span class="badge bg-secondary">系統預設</span>
                                {% else %}
                                    <span class="badge bg-primary bg-opacity-25 border border-primary text-primary">自訂</span>
                                {% endif %}
                            </td>
                            <td class="text-end">
                                {% if not c.is_default %}
                                <form method="POST" action="{{ url_for('category.delete_category', id=c.id) }}" class="d-inline" onsubmit="return confirm('確定要刪除此分類嗎？');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </form>
                                {% else %}
                                <button class="btn btn-sm btn-outline-secondary disabled" title="預設分類不可刪除"><i class="bi bi-trash"></i></button>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="col-lg-4">
        <div class="glass-card p-4 sticky-top" style="top: 100px;">
            <h5 class="fw-bold mb-4">新增自訂分類</h5>
            <form method="POST" action="{{ url_for('category.create_category') }}">
                <div class="mb-3">
                    <label class="form-label text-muted">分類類型</label>
                    <select name="type" class="form-select form-select-glass" required>
                        <option value="expense">支出 (Expense)</option>
                        <option value="income">收入 (Income)</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">分類名稱</label>
                    <input type="text" name="name" class="form-control form-control-glass" required placeholder="例如：寵物花費">
                </div>
                <button type="submit" class="btn btn-custom w-100 fw-bold">建立分類</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
